нет такого курса, но можно начать с чего-то попроще — например, пройти курс «Анализ и оценка рынка»."},"msu-marketing-research":{"name":"Маркетинговый исследователь","description":"\u003Cb\u003EМаркетинговый исследователь\u003C\u002Fb\u003E планирует и организует исследования полного цикла — от разработки дизайна исследования до предоставления рекомендаций заказчику. На основе результатов команда принимает решения, связанные с внедрением новых продуктов или улучшением текущих, может отслеживать показатели здоровья компании, развивать стратегию бренда.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EВ Практикуме пока нет такого курса, но можно присмотреться к направлению аналитики или пройти курс «Анализ и оценка рынка»."},"msu-Т-and-D":{"name":"Специалист по обучению персонала","description":"\u003Cb\u003EСпециалист по обучению персонала\u003C\u002Fb\u003E организовывает и планирует процесс обучения сотрудников, разрабатывает обучающие электронные курсы, участвует в формировании и внедрении подхода по адаптации сотрудников. Также он готовит материалы для тренингов и курсов, оценивает эффективность обучения и формирует статистику.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EК сожалению, у нас пока нет курса по этой профессии."},"msu-web-analyst":{"name":"Маркетинговый аналитик","description":"\u003Cb\u003EМаркетинговый аналитик\u003C\u002Fb\u003E добывает данные, на основе которых команда принимает продуктовые решения. В рабочие обязанности входит аудит и настройка аналитических инструментов (Amplitude, Firebase, Tableau), генерация и проверка гипотез, поиск точек роста продукта, дизайн, сопровождение и анализ A\u002FB-тестов, оценка объёмов рынков, составление портрета потребителя, подготовка презентаций с результатами.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EВ Практикуме пока нет курса по этой профессии, но есть много других в направлениях маркетинга и аналитики."},"msu-content-marketing":{"name":"Контент-маркетолог","description":"Главная задача — продвигать бренд и продукт компании в соцсетях, СМИ, на сайтах и других площадках. \u003Cb\u003EКонтент-маркетолог\u003C\u002Fb\u003E составляет и реализует контент-план в социальных сетях, например в VK, TikTok, YouTube. А также создаёт и размещает контент, работает с email-рассылками, статьями и подборками материалов, общается с подрядчиками, ищет новые способы привлечения клиентов и увеличения продаж."},"msu-strategic-planning":{"name":"Специалист по стратегическому планированию","description":"\u003Cb\u003EСпециалист по стратегическому планированию\u003C\u002Fb\u003E помогает развивать бизнес через анализ и планирование процессов и основных показателей деятельности компании. В том числе — анализирует деятельность бренда, рынок, конкурентную среду, предпочтения и мотивы потребителей, проводит глубинные интервью. Разрабатывает позиционирование и коммуникационные стратегии.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EВ Практикуме пока нет курса по этой профессии, но мы рекомендуем обратить внимание на курсы в направлении аналитики. "},"msu-HR-generalist":{"name":"Менеджер по персоналу","description":"\u003Cb\u003EМенеджер по персоналу\u003C\u002Fb\u003E делает так, чтобы процесс поиска, найма и адаптации сотрудников был максимально комфортным как для компании, так и для самих сотрудников. Для этого он участвует в формировании и реализации HR-стратегии компании, обеспечивает процессы, внедреяет и поддерживает систему мотивации, формирует эффективные взаимоотношения с бизнес-подразделениями, развивает корпоративную культуру и систему коммуникаций."},"msu-mobile-marketing":{"name":"Специалист по мобильному маркетингу","description":"\u003Cb\u003EСпециалист по мобильному маркетингу\u003C\u002Fb\u003E привлекает клиентов или продвигает продукт через мобильные устройства — ведёт рекламные кампании в Google Ads, ASA, MyTarget, Яндекс Директе, Appnext, TikTok, формирует и тестирует гипотезы, анализирует и интерпретирует результаты, готовит отчёты, ставит задачи аналитикам и продактам, контролирует их выполнение.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EВ Практикуме нет такого курса, но можно начать с курса «Анализ и оценка рынка» или «Интернет-маркетолог»."},"msu-internal-communications-manager":{"name":"Менеджер по внутренним коммуникациям","description":"\u003Cb\u003EМенеджер по внутренним коммуникациям\u003C\u002Fb\u003E разрабатывает и реализует стратегии по развитию внутренних коммуникаций, корпоративной культуры, бренда работодателя.  Он развивает каналы коммуникаций для разных целевых аудиторий и оценивает их эффективность, проводит исследования, ищет и анализирует новые нестандартные форматы и решения для повышения лояльности сотрудников.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EК сожалению, в Практикуме пока не обучают этой профессии, но мы регулярно добавляем в каталог новые курсы."},"msu-product-marketing-mangement":{"name":"Продуктовый маркетолог","description":"\u003Cb\u003EПродуктовый маркетолог\u003C\u002Fb\u003E помогает сделать из процессов запуска продукта единую систему. Он управляет всеми критериями, которые влияют на качество и успешность продукта. А ещё работает в постоянной связке с командой маркетинга, учебным отделом, продактами, дизайнерами, райтерами и отделом продаж. Главная задача продуктового маркетолога — объединить и проконтролировать все ресурсы для успешного выхода продукта на рынок.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EВ Практикуме пока не обучают этой профессии, но в каталоге есть курсы по направлениям маркетинга и аналитики, которые могут вам подойти."},"msu-game-developer":{"name":"Разработчик игр","description":"\u003Cb\u003EГейм-разработчики\u003C\u002Fb\u003E создают мобильные, компьютерные или игры для приставок и VR. Для разработки на каждую консоль или платформу нужен отдельный программист, художник, гейм-дизайнер, поэтому часто гейм-разработчики занимаются сразу несколькими направлениями. Они пишут код на Java, JavaScript, Python, Swift и других языках, а ещё много взаимодействуют с командой. Кроме технических знаний также пригодятся навыки коммуникации, усидчивость, креативность. \u003Cbr\u002F\u003E\u003Cbr\u002F\u003EУ нас нет специального курса по разработке игр, но можно начать с изучения Python или Java."},"msu-motion-designer":{"name":"Моушн-дизайнер","description":"\u003Cb\u003EМоушен-дизайнер\u003C\u002Fb\u003E «оживляет» изображения и создаёт с нуля анимационные проекты 2D и 3D. Это может быть инфографика, broadcast-дизайн, оформление блогов, роликов, презентационных фильмов, анимация, визуализация объектов, заставки, видеоэффекты. Также такой дизайнер может выступать режиссёром и монтажёром роликов, создавать гайды для других дизайнеров и аниматоров, заниматься адаптацией, ресайзом, локализацией материалов."},"msu-game-designer":{"name":"Гейм-дизайнер","description":"\u003Cb\u003EГейм-дизайнер\u003C\u002Fb\u003E — это режиссёр компьютерных игр, который отвечает за продумывание игрового процесса и разработку правил. Для этого он сотрудничает с дизайнерами и менеджерами, документирует идеи, концепции и технические проекты, разрабатывает дизайн UX-потока и каркасов пользовательского интерфейса. А также анализирует тенденции рынка и подходы конкурентов к дизайну игр, представляет новые игровые концепции и проекты заинтересованным сторонам.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EК сожалению, у нас пока нет курса по этой специальности, но можно начать с чего-то попроще в сфере дизайна или разработки."},"msu-finance-management":{"name":"Финансовый менеджер","description":"\u003Cb\u003EФинансовый менеджер\u003C\u002Fb\u003E помогает управлять компанией — контролирует и ведёт управленческий учёт, готовит бюджет и план-факторный анализ, составляет регулярные отчёты по динамике операционных и финансовых показателей. А ещё занимается финансовым моделированием и анализом проектов, много взаимодействует с бухгалтерией.\u003Cbr\u002F\u003E\u003Cbr\u002F\u003EВ Практикуме есть курс по этой специальности для людей с опытом в бухгалтерии, экономике, финансах. Если у вас нет такого опыта — рекомендуем начать с чего-то попроще."},"msu-traffic-manager-seo":{"name":"SEO-специалист","description":"\u003Cb\u003ESEO-специалист\u003C\u002Fb\u003E занимается продвижением сайтов в поисковых системах, чтобы их увидело как можно больше потенциальных клиентов. Для этого он делает семантический анализ запросов, готовит рекомендации по поисковому продвижению сайта, проводит внутреннюю и внешнюю оптимизацию сайтов. А ещё — тесно взаимодействует с отделом интернет-маркетинга, разработки и редакцией."}}},"motivationTest":{"title":"Пройдите тест и получите персональные советы","description":"Как учиться с удовольствием, справляться с тревогой и сдавать проекты вовремя","slides":[{"slideDescription":"Соедините утверждения справа и слева так,чтобы они описывали вас лучше всего","questions":[{"text":"Я мечтаю быть одним из лучших студентов в группе и достигать высоких результатов в учёбе","motivationType":"achievement"},{"text":"Мне важно иметь возможность обсуждать учёбу и делиться впечатлениями с теми, кто тоже учится","motivationType":"communication"},{"text":"Я хочу чётко понимать, как будет проходить учёба и сколько времени и усилий я на неё потрачу","motivationType":"stability"},{"text":"Я испытываю удовольствие, когда понимаю, что становлюсь экспертом в выбранной сфере","motivationType":"accuracy"}],"variants":[{"text":"Точно про меня","value":3},{"text":"Скорее про меня","value":2},{"text":"Иногда про меня","value":1},{"text":"Совсем не про меня","value":0}]},{"slideDescription":"Соедините утверждения справа и слева так,чтобы они описывали вас лучше всего","questions":[{"text":"Когда я понимаю, что у других студентов получается лучше, это мотивирует меня стараться больше","motivationType":"achievement"},{"text":"Мне важно, чтобы моей работой восхищались и ставили её в пример другим","motivationType":"communication"},{"text":"Я хочу узнать ровно столько, сколько нужно, чтобы получить работу мечты","motivationType":"stability"},{"text":"Меня часто называют перфекционистом, потому что я люблю детально разбираться в темах, которые мне интересны","motivationType":"accuracy"}],"variants":[{"text":"Точно про меня","value":3},{"text":"Скорее про меня","value":2},{"text":"Иногда про меня","value":1},{"text":"Совсем не про меня","value":0}]},{"slideDescription":"Соедините утверждения справа и слева так,чтобы они описывали вас лучше всего","questions":[{"text":"Про меня часто говорят, что я не успокоюсь, пока не добьюсь своего","motivationType":"achievement"},{"text":"Мне нужно с кем-то обсуждать задачи, которые нужно решить, и сравнивать свои решения с решениями других","motivationType":"communication"},{"text":"Я хочу гарантий, что мне помогут справиться со сложностями на пути к новой профессии","motivationType":"stability"},{"text":"Мне свойственны дотошность и придирчивость к деталям","motivationType":"accuracy"}],"variants":[{"text":"Точно про меня","value":3.6},{"text":"Скорее про меня","value":2.4},{"text":"Иногда про меня","value":1.2},{"text":"Совсем не про меня","value":0}]}],"results":{"achievement":{"title":"Достижения и успех","description":"Вам важно чётко видеть цель перед собой. Вы — амбициозный и настроенный на победу студент, готовый сворачивать горы на пути к мечте.","advices":[{"title":"Как не выгореть","description":"Чтобы путь к цели не казался бесконечным, представьте конечный результат — чем чётче, тем лучше. А потом разбейте цель на задачи поменьше и выполняйте одну за другой по мере сил.","backgroundImageSrc":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fachievement\u002Fachievement01.png","backgroundImageSrc2x":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fachievement\u002Fachievement01x2.png"},{"title":"Как закреплять новые знания","description":"Для этого многие студенты перечитывают всю теорию после сдачи проекта. Теперь делать это гораздо проще: в учебнике появился GPT-помощник, который может кратко пересказать содержание каждого урока. Так вы сэкономите кучу времени.","backgroundImageSrc":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fachievement\u002Fachievement02.png","backgroundImageSrc2x":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fachievement\u002Fachievement02x2.png"},{"title":"Как справляться с тревогой","description":"Чтобы объём запланированных личных, рабочих и учебных задач перестал вас тревожить, выпишите их на отдельный лист. Как только все задачи будут собраны в одном месте, вы перестанете пугаться их количества и думать о том, как много ещё не сделали.","backgroundImageSrc":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fachievement\u002Fachievement03.png","backgroundImageSrc2x":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fachievement\u002Fachievement03x2.png"}]},"communication":{"title":"Общение и поддержка","description":"Вы — командный игрок. Вам важно, чтобы рядом были единомышленники, с которыми можно поделиться мыслями и эмоциями о происходящем.","advices":[{"title":"Как строить социальные связи","description":"Задайтесь целью построить учебное комьюнити — многие студенты продолжают общаться и выручать друг друга даже после выпуска. Например, делитесь с одногруппниками вакансиями, ссылками на интересные статьи и дополнительные курсы.","backgroundImageSrc":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fcommunication\u002Fcommunication01.png","backgroundImageSrc2x":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fcommunication\u002Fcommunication01x2.png"},{"title":"Как поддерживать себя","description":"Если хотите узнать больше историй студентов о том, как им было трудно, но они всё-таки справились, советуем наш совместный с «Либо Либо» подкаст «Собес». Мы верим, что эти рассказы могут очень поддержать в трудную минуту.","backgroundImageSrc":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fcommunication\u002Fcommunication02.png","backgroundImageSrc2x":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fcommunication\u002Fcommunication02x2.png"},{"title":"Где узнавать о профессии и индустрии","description":"Послушайте плейлист «На курсах не расскажут» на Яндекс Музыке, в который мы добавили наши любимые подкасты про карьеру в IT, технологии, обучение и психологию. Включайте на пробежке или пока моете посуду.","backgroundImageSrc":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fcommunication\u002Fcommunication03.png","backgroundImageSrc2x":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fcommunication\u002Fcommunication03x2.png"}]},"stability":{"title":"Стабильность и ритм","description":"Вы прагматично подходите к учёбе и стремитесь получить необходимый минимум умений и навыков, чтобы найти стабильную работу","advices":[{"title":"Как концентрироваться","description":"Включите таймер на 15–25 минут и с головой погрузитесь в задачу. Потом сделайте перерыв на 5–10 минут: заварите чай, послушайте музыку. И повторите цикл. Так, небольшими, но существенными шагами придёте к большой цели.","backgroundImageSrc":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fstability\u002Fstability01.png","backgroundImageSrc2x":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fstability\u002Fstability01x2.png"},{"title":"Как справляться с тревогой","description":"Заносите в таблицу время, которое ежедневно уделяете занятиям. Когда в конце недели посмотрите на отчёт, то увидите, что делаете всё возможное: уделяете учёбе достаточно времени. И станет гораздо спокойнее.","backgroundImageSrc":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fstability\u002Fstability02.png","backgroundImageSrc2x":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fstability\u002Fstability02x2.png"},{"title":"Где искать мотивацию","description":"Старайтесь замечать каждое достижение и празднуйте их: например, вовремя сданный проект. Иногда с тортом и свечками, иногда как-то ещё. Это будет мотивировать двигаться дальше.","backgroundImageSrc":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fstability\u002Fstability03.png","backgroundImageSrc2x":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Fstability\u002Fstability03x2.png"}]},"accuracy":{"title":"Познание и экспертность","description":"Вы детально изучаете и критически анализируете каждый источник, часто не ограничиваясь только учебными материалами.","advices":[{"title":"Как вести конспекты","description":"Используйте функцию «Краткий пересказ», чтобы сохранить ёмкую версию пройденного урока. А если захотите написать заметку, это можно сделать прямо в учебнике.","backgroundImageSrc":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Faccuracy\u002Faccuracy01.png","backgroundImageSrc2x":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Faccuracy\u002Faccuracy01x2.png"},{"title":"Как создать свою базу знаний","description":"Заведите табличку в Notion с полезными ссылками и коротким описанием каждой: кто посоветовал этот источник, какая информация в нём содержится и зачем её изучать.","backgroundImageSrc":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Faccuracy\u002Faccuracy02.png","backgroundImageSrc2x":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Faccuracy\u002Faccuracy02x2.png"},{"title":"Как заниматься регулярно","description":"Поставьте еженедельное напоминание — желательно на выходной день — с текстом вроде «15 минут изучать одну ссылку по учёбе». Скорее всего задача затянет, и вы изучите больше одного источника.","backgroundImageSrc":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Faccuracy\u002Faccuracy03.png","backgroundImageSrc2x":"https:\u002F\u002Fcode.s3.yandex.net\u002Fmotivation\u002Faccuracy\u002Faccuracy03x2.png"}]}}},"promowebinarsUtmConfig":{"utm-url-params":["utm_source","utm_medium","utm_campaign","utm_content","utm_term"]},"bannersConfig":{"profile":{"priority":["price-will-rise","discount-event","referral-discount","check-list","jackpot"],"maxCount":1},"theory":{"priority":["price-will-rise","discount-event","re наших мероприятий.\n\nПереходи по ссылке — так попадёшь в чат с Юлей в Телеграме.","confirmButtonText":"Открыть чат в Телеграме","confirmButtonLink":"https:\u002F\u002Ft.me\u002Fyandexpracticumyuliabot"}},"taxDeductionInfo":{"maxTaxDeduction":19500,"taxRate":0.13,"profile.order.paymentInfoBlock.1.taxDeduction":"Можно получить налоговый вычет до \u003Cstrong\u003E{price, number, currency}\u003C\u002Fstrong\u003E","profile.order.paymentInfoBlock.2.taxDeduction":"Можно получить налоговый вычет до \u003Cstrong\u003E{price, number, currency}\u003C\u002Fstrong\u003E","faq.taxDeduction.question":"Что такое налоговый вычет на обучение и как его получить?","faq.taxDeduction.answer":"Это что-то вроде кешбэка от государства. Рассмотрим пример.\n\n\nЕсли вы являетесь налоговым резидентом, то есть находитесь на территории РФ более 183 дней в течение 12 месяцев, и работаете по трудовому договору, то каждый месяц ваш работодатель должен отчислять с вашей зарплаты 13% государству, чтобы оплатить подоходный налог.\n\n\nВот из этих денег вы можете вернуть себе до 15 600 рублей в год в виде налогового вычета за обучение. Для этого вам нужно подать соответствующее заявление через личный кабинет на сайте nalog.ru (можно залогиниться через Госуслуги).\n\n\nК заявлению нужно приложить все документы, подтверждающие ваше право на вычет, такие как:\n\n\n1. Справка 2-НДФЛ от вашего работодателя.\n2. Договор на обучение, в нашем случае это [оферта Практикума](https:\u002F\u002Fyandex.ru\u002Flegal\u002Fpraktikum_offer\u002F).\n3. Лицензия на образовательную деятельность. [Вот наша](https:\u002F\u002Fcode.s3.yandex.net\u002FLicense%20YSDA.pdf).\n4. Чеки об оплате обучения. Практикум отправляет эти чеки на ваш эл.адрес, их можно взять оттуда.\n5. Справка о получении образовательных услуг. Чтобы получить нашу справку, напишите в наш чат поддержки.\n\n\nВаше заявление будут рассматривать в налоговой в течение месяца. Инспектор может запросить другие документы, если этих ему покажется недостаточно. В случае успеха вам должны выдать специальное уведомление о праве на вычет. Это уведомление нужно передать в бухгалтерию вашего работодателя.\n\n\nТеперь работодатель должен будет выплачивать вам всю зарплату, не удерживая подоходный налог в пользу государства, пока не выплатит всю сумму вычета.\n\n\nЭто не единственный вариант получения вычета, подробнее можно почитать [на сайте налоговой](https:\u002F\u002Fwww.nalog.gov.ru\u002Frn77\u002Ftaxation\u002Ftaxes\u002Fndfl\u002Fnalog_vichet\u002Fsoc_nv\u002Fsoc_nv_ob\u002F).\n\n\nЕсли у вас остались вопросы про получение вычета, напишите в наш чат поддержки, постараемся ответить."}},"timer":null,"error":null,"getTimerDataLoadingStatus":null,"patchTimerDataLoadingStatus":null},"referralReducer":{"isReferralModalVisible":false,"title":""},"router":{"location":{"pathname":"\u002Flearn\u002Fpython-developer-plus\u002Fcourses\u002F2215a803-d994-4247-b44d-f5ce80079fdc\u002Fsprints\u002F747826\u002Ftopics\u002F761dfcae-ad44-45fa-8453-7726c1317746\u002Flessons\u002Fc4b03555-c138-4b44-8dc0-3cf0960acfd7\u002F","search":"","hash":"","state":undefined,"key":"pegioa","query":{}},"action":"POP"},"api":{"queries":{},"mutations":{},"provided":{},"subscriptions":{},"config":{"online":true,"focused":true,"middlewareRegistered":true,"refetchOnFocus":false,"refetchOnReconnect":false,"refetchOnMountOrArgChange":false,"keepUnusedDataFor":60,"reducerPath":"api","invalidationBehavior":"delayed"}},"pollsReducer":{"openedPoll":null,"pollToOpen":{"type":null}},"chatReducer":{"networkStatus":"connecting","tickets":[],"lastReadMessageId":null,"lastLoadedEventId":null,"pendingMessages":[],"ratingVariants":[],"feedbacks":{},"isChatOpened":false,"isChatOpenedProactive":false,"messengerUnreadCount":0,"messengerUnreadCounts":{"learning":0,"support":0},"chatVariant":"support"},"proficiencyReducer":{"initialState":{},"error":null,"generateOauthUrlLoadingStatus":null,"getProficiencyLoadingStatus":null,"proficiency":null,"getLessonLoadingStatus":null,"less
